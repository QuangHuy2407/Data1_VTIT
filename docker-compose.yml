version: '3.8'

# ==============================================================================
# DATA PIPELINE CÓ MÃ HÓA DỮ LIỆU
# Hệ sinh thái gồm: MinIO (Data Lake) → ClickHouse (OLAP DB) → Superset (BI)
# ==============================================================================

networks:
  data_pipeline_net:
    driver: bridge

volumes:
  clickhouse_data:
    driver: local
  superset_home:
    driver: local

services:

  # ============================================================
  # 1. MinIO – Object Storage (Data Lake, lưu file Parquet)
  # Console:  http://localhost:9001
  # S3 API:   http://localhost:9000
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: minio-app
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - D:\minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - data_pipeline_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # 2. ClickHouse – OLAP Database (nhận dữ liệu từ MinIO qua s3())
  # HTTP Interface: http://localhost:8123
  # Native Client:  localhost:9002  (map sang 9000 nội bộ)
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-app
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface (dùng cho Superset & Python)
      - "9002:9000"   # Native TCP interface (tránh xung đột với MinIO host port)
    environment:
      CLICKHOUSE_DB: pipeline_db
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - data_pipeline_net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================================
  # 3. Apache Superset – BI Dashboard (kết nối với ClickHouse)
  # Web UI: http://localhost:8088
  # Tài khoản: admin / admin
  # ============================================================
  superset:
    image: apache/superset:3.1.3
    container_name: superset-app
    restart: unless-stopped
    ports:
      - "8088:8088"   # Superset Web UI
    environment:
      SUPERSET_SECRET_KEY: "superset_secret_key_change_in_prod_2024"
      ADMIN_USERNAME: admin
      ADMIN_FIRSTNAME: Admin
      ADMIN_LASTNAME: User
      ADMIN_EMAIL: admin@superset.com
      ADMIN_PASSWORD: admin
    volumes:
      - superset_home:/app/superset_home
    networks:
      - data_pipeline_net
    depends_on:
      - clickhouse
      - minio
    command: >
      bash -c "
        pip install clickhouse-connect --quiet &&
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@superset.com
          --password admin
          2>/dev/null || true &&
        superset init &&
        /usr/bin/run-server.sh
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s